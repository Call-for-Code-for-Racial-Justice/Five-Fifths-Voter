      - topic: "Voting & elections"
        note: "This is Barrett's central campaign issue. In the interview she stated that every eligible Georgia voter who wants to vote should be able to do so easily across all 159 counties 'without fear of intimidation' and 'without fear that their private data is going to be stolen.' She supports current Georgia voter ID requirements but opposes the federal SAVE Act's proof-of-citizenship requirement, arguing the burden of verifying citizenship should fall on the government, not voters. She called for making Election Day a state holiday and said she would push back on federal overreach in elections, including through litigation with the Attorney General's office if necessary. In the debate she supported reinstating the Secretary of State as chair and voting member of the state election board, and backed rank-choice voting expansion at the state and local level. She proposed a hybrid paper-and-machine voting system to rebuild public confidence."
