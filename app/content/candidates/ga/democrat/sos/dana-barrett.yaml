  callout: "Dana Barrett is a Fulton County Commissioner, former tech executive, and small business owner running to be Georgia's first Democratic Secretary of State in roughly two decades. Her campaign centers on protecting election integrity against what she characterizes as MAGA-led threats, modernizing the Secretary of State's business licensing and registration systems, and cracking down on securities fraud. She highlights her willingness to contest the appointment of election-denier nominees to the Fulton County Board of Elections — including a threat of jail — as evidence of her commitment to defending free, fair, and secure elections."
