      - topic: "Small business & farming"
        note: "Barrett cited her small business background and highlighted that the Secretary of State's office is responsible for business registrations and professional licensing. In the interview she described the office's systems as 'antiquated' and gave a specific example of a contractor unable to pull subcontractor licenses on a non-mobile-friendly state website, calling this an unacceptable barrier for small business owners. In the debate she referenced passing small business legislation with a unanimous vote on the Fulton County Commission. Her stated goal is to modernize the SoS office's systems to better serve small businesses."
