    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "Barrett repeatedly cited affordability — gas, rent, childcare, and healthcare — as the motivating crisis behind her candidacy, stating in both the interview and debate that fixing the affordability crisis requires free, fair, and secure elections first. She described these as the problems she wants to solve but did not propose specific cost-of-living policies; the Secretary of State office is not her vehicle for addressing them directly."
