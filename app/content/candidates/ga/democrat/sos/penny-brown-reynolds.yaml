      - topic: "Voting & elections"
        note: "This is Reynolds's central campaign issue. In the interview she strongly opposed the federal SAVE Act, calling its proof-of-citizenship documentation requirement tantamount to a poll tax and stating that Georgia's existing voter ID system — driver's license, military ID, state ID, or passport — is adequate and working. She said the onus of citizenship verification should not fall on voters. She opposed the mass cancellation of 478,000 voter registrations, arguing that for every voter removed, the SoS has an obligation to run outreach to help eligible Georgians re-register. In the debate she supported printable, verifiable ballots and audits to restore public confidence, opposed the removal of the Secretary of State from the state election board, and backed expanding early voting sites and drop boxes statewide. Her campaign website commits to expanding early voting sites and accessible voting centers, strengthening absentee ballot access, rebuilding public trust through voter education, and protecting election workers from threats and political pressure."
