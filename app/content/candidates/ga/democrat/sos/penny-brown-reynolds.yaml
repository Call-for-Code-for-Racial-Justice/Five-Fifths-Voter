      - topic: "Small business & farming"
        note: "Reynolds made small business support a named priority across all three sources. In the interview she described the SoS office as the entry point for business formation and said it has 'not been helping businesses' or offering education, committing to change that. Her campaign website calls for streamlining business formation, launching a 'Business Access Georgia' digital dashboard with live support, expanding outreach via mobile business fairs in counties, and explicitly prioritizing Georgia's farmers and agricultural enterprises as small business stakeholders. She framed her approach as shifting the office from 'gatekeeper' to 'partner.'"
