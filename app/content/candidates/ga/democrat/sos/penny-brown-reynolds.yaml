  callout: "Penny Brown Reynolds is a former judge, attorney, licensed mediator/arbitrator, and ordained pastor running for Georgia Secretary of State. She served as the first Black attorney to a Georgia governor (Roy Barnes) and as a presidential appointee leading the civil rights division at USDA, where she managed over 100,000 employees. Her campaign centers on election integrity, modernizing professional licensing, empowering small businesses, and protecting seniors from fraud, with a governing philosophy she describes as nonpartisan and rooted in constitutional fidelity."
  data_note: "The Krimson PAC endorsement page (krimsonpac.org) was reviewed as a third source but is a third-party endorsement document, not an independent news source or voting record. Its platform summary was treated as corroborating the candidate's own website and is not cited as an independent source in the links array. The campaign website priorities page is used as the primary website source."
