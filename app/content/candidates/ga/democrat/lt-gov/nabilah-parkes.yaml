sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "Website states affordability is her 'top priority' and calls for cutting taxes on baby products, school supplies, and menstrual products, raising the minimum wage, and guaranteeing paid sick leave. In the interview she listed eliminating sales taxes on menstrual products, diapers, cribs, and strollers, and reviving the school supplies tax holiday as specific proposals. In the debate she named eliminating these sales taxes as direct cost-of-living measures."
        coverage: 3
        position_tag: "Government programs"
        position_type: "pos"
        source: "both"

      - topic: "Taxation"
        note: "In the interview, Parkes described introducing legislation to repeal billions of dollars in subsidies to data centers and insurance companies. Website calls for cutting sales taxes on essential family items. In the debate she cited eliminating sales taxes on menstrual products, diapers, and strollers. These are targeted tax restructuring proposals rather than a broad raise or cut stance."
        coverage: 2
        position_tag: "Restructure tax system"
        position_type: "pos"
        source: "both"

      - topic: "Small business & farming"
        note: "No position found in reviewed sources."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Workers & wages"
        note: "Website explicitly calls for raising the minimum wage and guaranteeing paid sick leave so workers do not have to choose between their health and their paycheck. Website also states she 'championed legislation' on wages and economic opportunity for working families. In the debate she described pushing for policies to help working families save money."
        coverage: 3
        position_tag: "Raise minimum wage"
        position_type: "pos"
        source: "both"

  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "Website states she 'support[s] legalizing marijuana so police can focus on real crime' under the gun safety section. No broader criminal justice or incarceration position found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Reproductive policy"
        note: "Website states she was a 'proud co-sponsor of the Reproductive Freedom Act to repeal Republicans' draconian six-week abortion ban' and will champion legislation to protect the right to birth control, reproductive healthcare, and pre- and post-natal care. In the debate closing she stated 'we need to defend a woman's right to choose' and called for repealing the six-week ban. Interview does not directly address."
        coverage: 3
        position_tag: "Pro-choice"
        position_type: "pos"
        source: "both"

      - topic: "Voting & elections"
        note: "Website calls for 'simplifying the process for lawful voters to cast their ballots, expanding early voting,' and cites Senate legislation to let voters permanently opt in for mail-in ballots. In the interview she stated 'the ability to vote is our constitutional right — we should make it easier and not harder,' and criticized redistricting efforts as erasing Black and minority representation. In the debate closing she named protecting voting rights as a core priority."
        coverage: 3
        position_tag: "Expand ballot access"
        position_type: "pos"
        source: "both"

      - topic: "Gun policy"
        note: "Website calls for 'common-sense gun safety measures like background checks, red flag laws and safe storage for firearms' and states she introduced legislation to ban firearm sales near schools, hospitals, and mental health institutions."
        coverage: 3
        position_tag: "Increase gun regulations"
        position_type: "pos"
        source: "website"

      - topic: "LGBTQ+ policy"
        note: "Website states she 'helped block harmful Republican-led legislation that would legalize discrimination against Georgians based on who they love or what they believe' and is committed to passing civil rights legislation protecting Georgians from discrimination in housing, public accommodations, and employment. Endorsement from Moms Demand Action visible on homepage."
        coverage: 2
        position_tag: "Expand protections"
        position_type: "pos"
        source: "website"

  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "In the interview Parkes stated she supports expanding Medicaid 'once and for all' and lowering insurance premiums, and cited Senate legislation to rein in insurance companies. Website states Georgia is 'one of only 10 states that has not fully expanded Medicaid' and she will 'finally make it happen.' In the debate she said she would 'work with rural Republicans' to get a Medicaid bill to the Senate floor. In her debate closing she named Medicaid expansion as a top priority."
        coverage: 3
        position_tag: "Expand public coverage"
        position_type: "pos"
        source: "both"

      - topic: "Education"
        note: "Website calls for increasing public school funding, updating the school funding formula, ensuring free breakfast and lunch for students in poverty, opposing private school voucher legislation, and fighting for teacher pay and healthcare. States she 'fought against the passage of a private school voucher bill that defunds public schools.' No education position stated in the debate or interview."
        coverage: 3
        position_tag: "Increase public school funding"
        position_type: "pos"
        source: "website"

      - topic: "Broadband & infrastructure"
        note: "No position found in reviewed sources."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "In the interview, Parkes called for a moratorium on data center construction until regulation is in place governing their use of energy and water resources, and cited legislation she introduced to repeal state subsidies for data centers. No broader environment or energy regulatory position found in reviewed sources."
        coverage: 2
        position_tag: "Prioritize regulation"
        position_type: "pos"
        source: "both"

      - topic: "Immigration"
        note: "In the interview she criticized ICE enforcement, describing 'masked ICE agents in our communities ripping away people from their homes.' In the debate she referenced introducing a bill requiring ICE to obtain a judge-signed warrant before entering schools, hospitals, domestic violence shelters, and libraries. No position on legal immigration pathways found in reviewed sources."
        coverage: 2
        position_tag: "Mixed approach"
        position_type: "mixed"
        source: "both"

      - topic: "Housing"
        note: "In the interview Parkes called for identifying and capping Wall Street investors buying up Georgia homes, requiring disclosure of LLC ownership, and pushing investors back to lower housing costs. In the debate she stated rent is 'too dang high' and called for 'capping Wall Street investors who are coming into our neighborhoods.' Website references commitment to affordability broadly but does not have a standalone housing section; the affordable Georgia section addresses cost-of-living without specific housing program detail beyond what appears in the interview."
        coverage: 3
        position_tag: "Increase government programs"
        position_type: "pos"
        source: "both"
