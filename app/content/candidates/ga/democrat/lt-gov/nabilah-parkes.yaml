  callout: "Nabilah Parkes is a former two-term Georgia state senator representing Gwinnett County (District 7), the youngest woman ever elected to the Georgia Senate and the first Muslim and South Asian woman to serve in that body. Her platform centers on Medicaid expansion, housing affordability, repealing the six-week abortion ban, expanding voting rights, and raising the minimum wage. She advanced to the June 16, 2026 Democratic primary runoff against state Sen. Josh McLaurin after no candidate cleared 50% on May 19."
