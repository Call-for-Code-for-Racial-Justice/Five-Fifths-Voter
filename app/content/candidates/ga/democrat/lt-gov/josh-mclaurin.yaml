  callout: "Josh McLaurin is a Georgia native, attorney, and four-term state legislator (House 2018–2022, Senate 2022–present) from Sandy Springs representing District 14. His platform centers on Medicaid expansion, affordable housing, workers' rights, and defending Black voting power, and he emphasizes his record of bipartisan legislative wins alongside outspoken opposition to MAGA policy. He advanced to the June 16, 2026 Democratic primary runoff against former state Sen. Nabilah Parkes after no candidate cleared 50% on May 19."
