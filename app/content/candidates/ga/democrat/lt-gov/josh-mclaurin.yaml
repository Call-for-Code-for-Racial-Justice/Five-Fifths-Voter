sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "In the interview, McLaurin stated Democrats have 'much more specific plans on the cost drivers that are making life less affordable,' naming healthcare, housing, and child care as the primary levers. He argued Republican income and property tax cut proposals 'don't really work' at scale. Website states he will 'redirect state dollars to working families, not corporate giveaways' and reinvest state revenues into working family needs."
        coverage: 3
        position_tag: "Government programs"
        position_type: "pos"
        source: [0,1]

      - topic: "Taxation"
        note: "In the interview, McLaurin proposed funding healthcare premium subsidies by 'taxing insurance company profits,' describing it as 'pretty popular.' He also criticized Republican income and property tax cut plans as fiscally unworkable. Website frames the contrast as redirecting revenues away from corporate tax breaks. No explicit call to raise or restructure the broad tax system beyond these targeted proposals."
        coverage: 2
        position_tag: "Restructure tax system"
        position_type: "pos"
        source: [0,1]

      - topic: "Small business & farming"
        note: "In the debate, McLaurin criticized top-down rural development that 'attract[s] the big corporation, give[s] billions in tax credits or tax breaks' without hiring local union workers or investing in local infrastructure. He proposed a 'rural task force' to support small towns. This critiques a specific incentive practice rather than staking out a position on the level of small business regulation or support as defined by the taxonomy. No direct small business regulatory position stated in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Workers & wages"
        note: "In the debate, McLaurin stated 'we can afford a living wage of at least $15 an hour' and noted Georgia's minimum wage is below the federal floor. Website states he will 'stand with labor to protect the right to organize' and calls Georgia's right-to-work laws an obstacle to fair wages and worker organizing. AFL-CIO endorsement cited in both sources."
        coverage: 3
        position_tag: "Raise minimum wage"
        position_type: "pos"
        source: [0,1]

  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "In the debate, McLaurin described successfully pushing back on a bill that 'would have penalized people for simple possession of drugs,' framing it as opposing criminalization of addiction and supporting mental health alternatives. Senate Republicans amended their bill as a result. No broader criminal justice platform found in reviewed sources."
        coverage: 2
        position_tag: "Invest in prevention"
        position_type: "pos"
        source: [0]

      - topic: "Reproductive policy"
        note: "Website states Georgia's six-week abortion ban is 'one of the most extreme in the country,' that McLaurin 'voted against it in 2019,' and that he will 'work to overturn the ban.' In the debate closing statement, McLaurin cited the endorsement of Georgia Equality and referenced standing against 'attacks on vulnerable groups.' Interview does not address directly."
        coverage: 3
        position_tag: "Pro-choice"
        position_type: "pos"
        source: [2]

      - topic: "Voting & elections"
        note: "In the interview, McLaurin extensively addressed the impact of the Supreme Court's LAllen v. Milligan ruling on Section 2 of the Voting Rights Act, arguing it opens the door to eliminating Black voting power through redistricting. He called it 'a generational civil rights moment.' Website states he is committed to ensuring 'minority voting power is protected.' In the debate, he referenced using procedural authority to force votes on issues blocked by the current lieutenant governor."
        coverage: 3
        position_tag: "Expand ballot access"
        position_type: "pos"
        source: [0,1]

      - topic: "Gun policy"
        note: "No position found in reviewed sources."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "LGBTQ+ policy"
        note: "In the debate closing statement, McLaurin cited the endorsement of Georgia Equality and stated he 'stood up to fight back against bullying legislation against the most vulnerable groups in our society.' Website states he is committed to 'passing laws that prohibit discrimination of all kinds.' No specific legislation named in reviewed sources."
        coverage: 2
        position_tag: "Expand protections"
        position_type: "pos"
        source: [0,1]

  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "In the interview, McLaurin called for full Medicaid expansion, citing a 90% federal match and coverage for over 500,000 uninsured Georgians, and proposed replacing lost ACA premium subsidies at the state level funded by a tax on insurance company profits. In the debate, he stated the current lieutenant governor used procedural rulings to block Medicaid votes. Website: 'Georgia's failure to expand Medicaid has shuttered hospitals and left half a million Georgians uninsured. Josh will fight to expand coverage.'"
        coverage: 3
        position_tag: "Expand public coverage"
        position_type: "pos"
        source: [0,1]

      - topic: "Education"
        note: "In the interview, McLaurin listed child care funding as part of the Democratic affordability agenda. In the debate closing he cited the endorsement of Young Democrats who want him to 'address climate change and other generational challenges.' No specific K-12 or higher education funding position found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Broadband & infrastructure"
        note: "In the interview, McLaurin mentioned public transit investment as a long-term goal, stating 'if you want good public transit in Georgia, you may have to wait 10, 20, 30 years for us to make the requisite investments.' No broadband-specific position found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "In the debate closing, McLaurin cited the endorsement of Young Democrats and referenced 'climate change and other generational challenges.' No specific energy or environmental regulatory position found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Immigration"
        note: "In the interview, McLaurin criticized the 'ICE and CBP' deployments in communities and called the $70 billion ICE expansion a result of 'race baiting and fear of immigrants.' In the debate, Parks accused him of refusing to co-sign her bill requiring warrants before ICE entered sensitive locations; McLaurin said he did not recall this and disputed her characterization. His stated position is opposition to current ICE enforcement practices, but this addresses enforcement conduct rather than staking out a position on enforcement levels vs. legal pathways as defined by the taxonomy. No explicit pathway position found."
        coverage: 2
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Housing"
        note: "In the interview, McLaurin proposed: restricting corporate/hedge fund ownership of single-family housing, zoning reform to allow smaller lot sizes and more units, and funding the state housing trust fund through budget surplus or revenue sources. Website: 'Georgia has the highest percentage of private equity ownership of multifamily units in the country... Josh will fight to restore the American Dream by making homes affordable and accessible to individual Georgians.'"
        coverage: 3
        position_tag: "Increase government programs"
        position_type: "pos"
        source: [0,1]
