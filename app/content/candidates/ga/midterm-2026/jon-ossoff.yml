  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "In the CNN interview, Ossoff said Trump's policies 'doubled health insurance premiums for more than a million Georgians' and that 'cancer patients face down the prospect of losing health coverage.' The Five-Year Report documents he fought to protect ACA tax credits, opposed $1 trillion in Medicaid cuts in the OBBB, opposed RFK Jr.'s confirmation, fought CDC firings, and championed maternal health data systems. He explicitly backed expanding public coverage mechanisms (ACA, Medicaid) and opposed their reduction."
        coverage: 3
        position_tag: "Expand public coverage"
        position_type: "pos"
        source: [1, 2]

      - topic: "Education"
        note: "The Five-Year Report notes Ossoff fought to restore HBCU scholarship funding after the Trump Administration cancelled it, introduced the Skilled Workforce Act for workforce training at public high schools and technical colleges, cosponsored the JOBS Act for short-term job training, and pushed to expand Pell Grants. His focus is on increasing public education investment; no school choice position was found."
        coverage: 2
        position_tag: "Increase public school funding"
        position_type: "pos"
        source: [2]

      - topic: "Broadband & infrastructure"
        note: "The About page states Ossoff championed 'the historic bipartisan infrastructure law' and is 'delivering an unprecedented expansion of broadband internet access; upgrading ports, airports, roads, bridges, and water infrastructure statewide.' The Five-Year Report also references his American Energy Security Act to authorize Federal grants for natural gas infrastructure and his efforts to protect EPA infrastructure grants. This is explicitly framed as public federal investment."
        coverage: 3
        position_tag: "Increase public investment"
        position_type: "pos"
        source: [2]

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "The Five-Year Report states Ossoff worked to protect the Okefenokee Swamp, expanded its federal acquisition boundary, passed an amendment encouraging greater federal protection, and opposed the titanium mine proposal. He also raised concerns that the GOP budget law eliminating clean energy manufacturing incentives could cost Georgia 43,000 jobs. No explicit fossil fuel regulation or emissions standard position was found, but his consistent support for the bipartisan infrastructure law and clean energy manufacturing frames his position as balancing environmental protection with economic development."
        coverage: 2
        position_tag: "Balance both"
        position_type: "pos"
        source: [2]

      - topic: "Immigration"
        note: "The Five-Year Report documents Ossoff launched a formal investigation into human rights abuses in U.S. immigration detention, releasing two reports documenting over 510 credible reports of abuse, deaths in custody, and medical neglect in DHS, BOP, and HHS facilities. In the HCR interview, he referenced investigators documenting 'more than a thousand credible reports of serious human rights abuses in ICE detention facilities.' His focus is on oversight and civil rights enforcement within the detention system; no position on legal pathways or enforcement priorities as policy directions was found."
        coverage: 2
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Housing"
        note: "The Five-Year Report documents Ossoff launched an investigation into large out-of-state corporations buying up Georgia single-family homes and driving up prices, passed a bipartisan amendment requiring a federal watchdog investigation of the housing affordability crisis, and held oversight hearings on renters facing dangerous conditions. He won bipartisan support for a GAO investigation into rental housing conditions. His approach centers on government oversight and federal investigation rather than a named regulatory or development program."
        coverage: 2
        position_tag: "Increase government programs"
        position_type: "pos"
        source: [2]
