sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "In the CNN interview, Ossoff stated that Trump's tariffs have driven up grocery prices and that Americans faced record high prices for groceries, healthcare, and housing. He also opposed the OBBB's Medicaid cuts and fought ACA tax credit expiration that he said doubled health insurance premiums for more than a million Georgians. His Five-Year Report notes he urged the administration to repeal tariffs and opposed the budget law's elimination of clean energy manufacturing incentives. Criticism of tariff-driven price increases is framed as government policy failure; his response is legislative and regulatory, not a named market or government program."
        coverage: 2
        position_tag: "Government programs"
        position_type: "pos"
        source: [1, 2]

      - topic: "Taxation"
        note: "The Five-Year Report notes Ossoff introduced the bipartisan Support Small Business Growth Act of 2025 to create a new tax deduction for qualifying small businesses with fewer than 15 employees. He also introduced an amendment to ban Congressional stock trading, blocked by Republicans. No broader income or corporate tax position was found in the reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Small business & farming"
        note: "Ossoff's Five-Year Report details extensive agricultural support: secured $21 billion in Hurricane Helene disaster relief for Georgia farmers, fought for Vidalia onion, pecan, peanut, and cotton funding in appropriations, introduced the Support Small Business Growth Act with a small business tax deduction, the Simplifying Subcontracting Act, and delivered over $6 million in apprenticeship funding to the Technical College System. He explicitly opposed Trump's tariffs as harmful to small businesses and Georgia's agricultural sector."
        coverage: 3
        position_tag: "Addresses both directions"
        position_type: "mixed"
        source: [1, 2]

      - topic: "Workers & wages"
        note: "The Five-Year Report references Ossoff introducing the Skilled Workforce Act to incentivize companies to invest in equipment at high schools and technical colleges for workforce training, and delivering over $6 million in apprenticeship funding. No position on minimum wage or union protections was found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "The Five-Year Report documents that Ossoff led bipartisan investigations into corruption and civil rights abuses in the federal prison system, passed the Prison Staff Safety Enhancement Act, introduced the Stopping Prison Contraband Act, and passed the Justice for Murder Victims Act. His HCR interview references prior investigations into 'civil rights abuses and corruption in our federal prison system' and abuse of detainees. His focus is on both accountability/oversight of abuses and strengthening enforcement, but the sources do not distinguish incarceration-reduction vs. prevention vs. enforcement at a policy-direction level with separately evidenced mechanisms."
        coverage: 2
        position_tag: "Invest in prevention"
        position_type: "pos"
        source: [0, 2]

      - topic: "Reproductive policy"
        note: "The Five-Year Report states Ossoff 'continued his ongoing investigation into the impacts of Georgia's 6-week abortion ban,' released reports finding the ban causes doctors to delay life-saving care and threatens Georgia's OBGYN shortage, and held an oversight session where Georgia women described life-threatening consequences of the ban. His investigative and legislative activity is consistently critical of abortion restrictions and focused on their harms to patient care."
        coverage: 3
        position_tag: "Pro-choice"
        position_type: "pos"
        source: [2]

      - topic: "Voting & elections"
        note: "In the HCR interview, Ossoff referenced Citizens United as 'the most destructive court decision in modern American history' for opening 'the floodgates for secret corporate money, secret billionaire money to corrupt our politics.' He also introduced an amendment to ban Congressional stock trading. No direct position on ballot access or voter verification mechanisms was found in reviewed sources."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Gun policy"
        note: "No position on gun policy was found in any of the reviewed sources."
        coverage: 0
