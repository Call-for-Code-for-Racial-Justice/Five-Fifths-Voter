      - topic: "Broadband & infrastructure"
        note: "Collins addressed data center infrastructure in the debate when asked about federal versus state regulation. He stated federal financing should be available for data centers given the AI race with China, but that local communities should retain the right to reject them, and that data center companies should pay for local infrastructure impacts. This reflects a mixed federal/local framing but is focused on a narrow technology infrastructure question, not broadband access broadly."
        coverage: 1
        position_tag: "Public-private partnership"
        position_type: "pos"
        source: [0]

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "No direct position found in reviewed sources on environmental regulation or energy policy for this Senate race. Collins chairs the House Transportation and Infrastructure Subcommittee on Water Resources and Environment per his Wikipedia page, but no environment or energy policy statement was made in the debate or on the campaign website."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Immigration"
        note: "Immigration is Collins's most extensively documented issue. He authored the Laken Riley Act (signed into law by President Trump as his first bill), which requires ICE to detain undocumented immigrants charged with theft. In the debate he repeatedly attacked his opponent for supporting 'criminal immigrants' and called for stricter enforcement. Wikipedia documents he also introduced the RAZOR Act to ban removal of Texas border barriers, and previously called for criminal charges against a migrant who was later cleared. His Senate campaign opening statement cited border enforcement as a core rationale for running."
        coverage: 3
        position_tag: "Stricter enforcement"
        position_type: "pos"
        source: [0,1]

