  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "Healthcare is one of Dooley's most thoroughly developed positions. Across the debate, the MDJ interview, and his campaign website, he consistently calls for price transparency ('the only industry where you find out how much something costs after the service is delivered'), putting patients and doctors — not insurance companies or government — in charge of decisions, protecting rural hospitals and access (noting women in Rabun County drive an hour for prenatal care), and driving down costs through innovation and competition. On the ACA, he said he supports an important safety net for those who need it but opposes subsidizing people who make hundreds of thousands of dollars. He does not call for full ACA repeal. This transparency-and-competition framing is a standalone position that does not map cleanly to expanding public coverage or expanding private options. His campaign website's 'Putting Patients and Doctors First' page names transparency, patient/doctor choice, and rural access as the three pillars."
        coverage: 3
        position_tag: "Centrist or alternative approach"
        position_type: "pos"
        source: [0,1]

      - topic: "Education"
        note: "Dooley repeatedly addressed the college-vs.-skills gap — calling for expanded career training through high schools, technical colleges, and apprenticeships — in the debate, MDJ interview, and his campaign website. He praised Gov. Kemp's workforce development initiatives in Georgia as a national model. He did not address K-12 school choice, public school funding levels, or vouchers in any reviewed source."
        coverage: 2
        position_tag: "Increase public school funding"
        position_type: "pos"
        source: [0,1]

      - topic: "Broadband & infrastructure"
        note: "No direct position found in reviewed sources on broadband access or infrastructure investment. Not addressed in the debate, MDJ interview, or campaign website."
