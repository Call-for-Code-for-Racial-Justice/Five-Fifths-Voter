  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "Dooley's More Jobs, Higher Wages website page calls for unleashing American energy, stating 'America has the resources to lead the world in energy production' and supporting policies that 'drive down costs for businesses and families.' No mention of environmental regulation, climate policy, or renewable energy in any reviewed source."
        coverage: 2
        position_tag: "Prioritize energy production"
        position_type: "pos"
        source: [0]

      - topic: "Immigration"
        note: "Dooley addressed immigration at length in both the MDJ interview and on his campaign website's Safe Communities page. He supports keeping the border closed as Trump has done, deporting criminal illegal immigrants, and codifying executive orders through legislation so policy does not change every four years. He criticized the prior administration's 'open borders' policy and said Congress has repeatedly failed to act. He also expressed support for a long-term legislative solution rather than relying on executive orders, and acknowledged a pathway that addresses the issue sustainably."
        coverage: 3
        position_tag: "Stricter enforcement"
        position_type: "pos"
        source: [0,1]

