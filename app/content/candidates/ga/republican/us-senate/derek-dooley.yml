sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "Dooley named cost of living as the top issue he has heard across the state in both the debate and the MDJ interview. He identified three drivers: government overspending ('we haven't balanced a budget in 25 years'), excessive regulation ('get the hell out of the way'), and a workforce skills gap from overemphasis on four-year college. His website's More Jobs, Higher Wages page echoes all three with policy framing: cut burdensome regulations, unleash American energy, and build skills through high schools, technical schools, and apprenticeships. He cited Georgia Governor Kemp as a national model on workforce development."
        coverage: 3
        position_tag: "Market-driven solutions"
        position_type: "pos"
        source: [0,1]

      - topic: "Taxation"
        note: "No direct position on tax rates, specific tax legislation, or tax structure was stated in the debate or MDJ interview. Dooley mentioned the deficit and overspending but framed it as a spending problem rather than a revenue or tax structure issue. No position found in reviewed sources."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Small business & farming"
        note: "Dooley's More Jobs, Higher Wages website page states he will work to 'cut burdensome regulations, reduce unnecessary bureaucracy, and make it easier for our job creators to start, operate, and grow businesses.' In the MDJ interview he said eight out of ten job creators he spoke to said the government should 'get out of the way.' No agriculture-specific policy was cited, but his general pro-business, deregulation orientation is clearly stated."
        coverage: 2
        position_tag: "Reduce regulation"
        position_type: "pos"
        source: [0,1]

      - topic: "Workers & wages"
        note: "Dooley addressed workforce development at length — calling for investment in career training through high schools, technical colleges, and apprenticeships to address a skills gap — but did not address minimum wage, unions, or labor protections in any reviewed source. His stated approach is a standalone skills-and-opportunity framing rather than a wage-mandate or deregulation position."
        coverage: 2
        position_tag: "Centrist or alternative approach"
        position_type: "pos"
        source: [0,1]

  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "No position found in reviewed sources on criminal justice reform, incarceration, prevention programs, or law enforcement funding as a policy arena. Dooley's Safe Communities website page says he will 'back law enforcement' and support 'enforcing the law,' but this is a general statement tied to border enforcement context, not a criminal justice system position."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Reproductive policy"
        note: "Dooley addressed abortion directly in both the debate and the MDJ interview. He stated he agrees with President Trump and the Supreme Court that it should be a state issue and that the federal government should not intervene. In the MDJ interview he added: 'I have a tremendous respect for life. I also think that women should have a reasonable amount of time to make a very tough and personal decision.' When asked whether he personally supports Georgia's six-week heartbeat bill, he said it has been the law of the land for six years and he would not intervene as a U.S. senator. He declined to give a personal directional position, consistently deferring to states rather than stating a pro-life or pro-choice view."
        coverage: 3
        position_tag: "Restrictions with exceptions"
        position_type: "pos"
        source: [0,1]

      - topic: "Voting & elections"
        note: "In the MDJ interview, Dooley cited Georgia's Election Integrity Act as a model and expressed confidence in the state's election system, noting high turnout and minority participation after the law passed. He said the lesson is that election security and turnout can coexist, and said he would 'stay vigilant.' He supports voter ID and proof of citizenship via the Save America Act, which he said could pass through reconciliation. Mentioned in debate as well."
        coverage: 2
        position_tag: "Strengthen voter verification"
        position_type: "pos"
        source: [0,1]

      - topic: "Gun policy"
        note: "No position found in reviewed sources on gun policy. Not addressed in the debate, MDJ interview, or campaign website."
        coverage: 0
