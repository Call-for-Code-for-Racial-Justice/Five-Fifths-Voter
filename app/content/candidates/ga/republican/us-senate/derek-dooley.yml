      - topic: "LGBTQ+ policy"
        note: "No direct position found in reviewed sources on LGBTQ+ policy. In the MDJ interview Dooley mentioned 'the woke stuff that he pushed on our kids, the men and women's sports' as one criticism of opponent Jon Ossoff, which implies opposition to transgender inclusion in women's sports, but he did not state a policy position on LGBTQ+ issues directly."
