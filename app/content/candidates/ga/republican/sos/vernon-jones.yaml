  callout: "Vernon Jones is a former Democratic state legislator and DeKalb County CEO who switched parties and became a prominent supporter of Donald Trump following the 2020 election. He is running for Georgia Secretary of State on a platform centered on election integrity, voter roll cleanup, restricting absentee ballots, returning to paper ballots, and streamlining professional licensing. The race is narrowly scoped to the SOS office's administrative functions, and Jones addressed virtually no positions on the broader policy topics in the Five Fifths taxonomy."
