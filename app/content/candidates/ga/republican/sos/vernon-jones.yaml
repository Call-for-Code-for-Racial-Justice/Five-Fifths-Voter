        note: "Jones made election integrity the centerpiece of his campaign. In the debate he called for cleaning voter rolls, returning to paper ballots, restricting absentee voting to military, disabled, and elderly voters, and eliminating QR codes from ballots. On his platform page he commits to stricter voter photo ID requirements, cross-checking registration data to remove non-citizens, and limiting absentee/mail ballots. He stated: 'We want to make it easy to vote and hard to cheat.' He also alleged fraud in Georgia's 2020 election and cited irregularities as justification for tighter rules."
