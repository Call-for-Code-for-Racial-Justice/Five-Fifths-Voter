      - topic: "Voting & elections"
        note: "Fleming addressed this topic extensively across all three sources. In the debate he said he supports moving to hand-marked paper ballots, citing that over 70% of the United States votes that way and calling Florida the gold standard. He sponsored legislation to clean up DMV-linked voter roll errors and chaired the House Blue Ribbon Committee on Elections Reform. He stated he voted against Senate Bill 214 because it delayed removal of QR codes from ballots, and expressed intent to fix that in a June 17 special session. He supports the President's Safe America Act for national election standards. He said he opposes mailing absentee ballots broadly, stating the only way to get one should be if you're elderly, disabled, or a military service member serving overseas. In the interview he expressed support for giving local governments more control over early voting schedules. On the campaign website he lists championing voter ID and election transparency and making it impossible for the Left to cheat as priorities."
        coverage: 3
        position_tag: "Strengthen voter verification"
