sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "Kennedy repeatedly cited affordability as a top concern. In the debate he said 'Georgians are hurting right now in making ends meet. Costs continue to rise. Wages are stagnant' and committed to property tax relief as a primary driver of affordability. In his closing statement he said eliminating property taxes 'is going to be an absolute priority of mine as your next lieutenant governor.' The website frames the office around making Georgia a place where people can 'live, work, and raise a family.' Specific mechanism cited is property tax elimination; no reference to new government spending programs."
        coverage: 3
        position_tag: "Market-driven solutions"
        position_type: "pos"
        source: "both"

      - topic: "Taxation"
        note: "Kennedy referenced the ongoing income tax reductions passed during his Senate tenure ('we started reducing the state income tax in 2019') and expressed disappointment that more progress on property tax elimination was not made in the 2026 session. In his closing statement he stated eliminating property taxes is a priority he will deliver on. No support for tax increases was expressed in any source."
        coverage: 3
        position_tag: "Reduce taxes"
        position_type: "pos"
        source: "both"

      - topic: "Small business & farming"
        note: "Kennedy detailed his authorship of SB 68 and SB 69 (2025 tort reform) in the Trent Talks interview, framing it explicitly as protection for small and family-owned businesses from excessive lawsuit exposure. He cited the Chamber of Commerce's estimate of a $5,000-per-family annual 'hidden tort tax' and noted that insurance costs were causing businesses to question whether to stay in Georgia. The campaign website also commits to fighting for farm families, helping them find new markets, and making it easier to 'start, operate, and grow a family farm.'"
        coverage: 3
        position_tag: "Reduce regulation"
        position_type: "pos"
        source: "both"

      - topic: "Workers & wages"
        note: "No position found in reviewed sources. Kennedy mentioned 'wages are stagnant' as a general concern in the debate but made no statement on minimum wage policy or worker protections."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "Kennedy addressed two threads in the Trent Talks interview. On enforcement, the campaign website calls for supporting law enforcement, recruiting and retaining officers, dismantling criminal gangs, and 'strengthening our laws.' On the other side, Kennedy called the state's handling of the mental health population a 'passion issue,' stating that people with mental illness are being incarcerated because there is nowhere else to place them and are 'not getting any mental health services' while incarcerated — which he called 'not right.' He advocated for dedicated mental health facilities and expressed that current budget commitments are 'not enough.' Both threads are drawn from sources, placing him in 'mixed approach' territory — enforcement emphasis plus stated concern about incarceration of the mentally ill."
        coverage: 3
        position_tag: "Mixed approach"
        position_type: "mixed"
        source: "both"

      - topic: "Reproductive policy"
        note: "No position found in reviewed sources. The debate included no questions on reproductive policy and the campaign website contains no statement on the topic."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Voting & elections"
        note: "In the debate, Kennedy served on the Senate's special investigative committee examining Fulton County DA Fani Willis and the 2020 election. He stated that 'anyone who defrauded money should get every single penny back' and called Willis's conduct 'shameful.' He did not express a specific position on ballot access expansion or voter verification measures in the debate. No voting/elections policy position found on the campaign website."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Gun policy"
        note: "The campaign website homepage references 'standing up for our God-given rights' in a list of legislative priorities but does not name gun policy specifically. No position found in the debate transcript. Insufficient specificity to assign a tag."
        coverage: 1
