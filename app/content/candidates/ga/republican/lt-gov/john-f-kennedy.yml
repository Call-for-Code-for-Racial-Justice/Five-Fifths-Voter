  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "In the Trent Talks interview, Kennedy described the mental health crisis among Georgia's uninsured population as a 'passion issue,' citing inadequate state facilities since the closure of mental health institutions. He referenced HB 1013 (passed ~3 years prior) as a partial improvement and expressed support for budgeting a new mental health hospital, while stating current plans are 'not enough.' This is framed as a state investment in a public gap rather than expansion of insurance coverage or private options. Note: this position addresses a narrow slice of healthcare (uninsured mental health); no broader healthcare coverage position was found."
        coverage: 2
        position_tag: "Expand public coverage"
        position_type: "pos"
        source: "debate"

      - topic: "Education"
        note: "Kennedy cited school choice as a legislative priority in the debate and on the campaign website, which states he looks forward to continuing school choice progress as Lt. Governor. In the Trent Talks interview he named chronic absenteeism as his top passion issue, describing SB 123 — legislation he authored requiring local school systems to identify causes and craft remedies — as a named, signed bill. He also formed a statewide study committee on the issue. The website and debate both reference opposition to political indoctrination in classrooms and support for parental voice in education."
        coverage: 3
        position_tag: "Both public and choice"
        position_type: "pos"
        source: "both"

      - topic: "Broadband & infrastructure"
        note: "In the debate, Kennedy addressed infrastructure in the context of rural economic development, stating that rural Georgia lacks 'the infrastructure to attract business and industry' and that 'infrastructure development in the more rural areas of the state' requires 'the expenditure of funds to make sure that the rest of Georgia is ready.' This is framed as a state government investment priority. No mention on the campaign website."
        coverage: 2
        position_tag: "Increase public investment"
        position_type: "pos"
        source: "debate"

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "No position found in reviewed sources. The debate included a question about data center energy costs; Kennedy stated that data centers should bear the cost of additional power infrastructure rather than ratepayers, but this does not constitute a position on energy regulation or environmental policy as defined in the taxonomy."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Immigration"
        note: "No position found in reviewed sources. Immigration was discussed by other candidates in the debate but Kennedy made no statement on the topic in his answers or closing statement. No immigration position appears on the campaign website."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Housing"
        note: "In the debate, Kennedy connected property tax relief directly to housing affordability for young Georgians, stating 'one of the largest aspects of the cost of a home is property taxes. We've got to get that reigned in' and expressing a desire to ensure 'home ownership is something that young people... think it's within their reach.' This is framed as a tax-reduction approach rather than a government housing program. No housing-specific policy beyond tax relief found on the website."
        coverage: 2
        position_tag: "Reduce development barriers"
        position_type: "pos"
        source: "debate"
