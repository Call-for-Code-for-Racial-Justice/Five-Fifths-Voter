  - id: "civil-rights-justice"
    title: "Civil rights & justice"
    items:
      - topic: "Criminal justice system"
        note: "The campaign website commits to 'fully funding law enforcement' and ensuring officers have the tools they need, stating 'law and order must be upheld.' In the debate Dolezal referenced cracking down on crime in cities. No incarceration reform, prevention investment, or rehabilitation language found in any source."
        coverage: 2
        position_tag: "Increase enforcement"
        position_type: "pos"
        source: [0,1]

      - topic: "Reproductive policy"
        note: "The campaign website states 'Life begins at conception and must be protected' and notes Dolezal 'proudly supported Georgia's heartbeat bill.' In the debate introduction he described himself as 'unapologetically pro-life.' In his closing statement he referenced the Riley Gaines Act as a signature achievement. Position is explicit and consistent across all three sources."
        coverage: 3
        position_tag: "Pro-life"
        position_type: "pos"
        source: [0,1]

      - topic: "Voting & elections"
        note: "Highly detailed across all sources. In the interview Dolezal called for moving to hand-marked paper ballots, cleaning voter rolls, and eliminating Dominion machines, describing election integrity as a boat with constant leaks requiring constant patching. He cited specific anomalies in Fulton County voter rolls. The website states he co-sponsored more paper ballot legislation than any member of the General Assembly. In the debate he raised these same positions and referenced QR code elimination. Position consistently emphasizes tightening verification and rolling back electronic systems."
        coverage: 3
        position_tag: "Strengthen voter verification"
        position_type: "pos"
        source: [0,1]

      - topic: "Gun policy"
        note: "The campaign website states 'Shall not be infringed is clear,' describes Dolezal as a 'strong defender of the right to self-defense and gun ownership,' and notes an A+ NRA rating. No gun policy statement found in the debate transcript or interview, but website position is explicit and specific."
        coverage: 3
        position_tag: "Expand gun rights"
        position_type: "pos"
        source: [2]

      - topic: "LGBTQ+ policy"
        note: "Dolezal authored and passed the Riley Gaines Act, cited on the campaign website as keeping 'men out of women's sports and out of our daughters' locker rooms.' In the debate he described himself as having 'banned DEI mandates' and referenced the Riley Gaines Act as a signature achievement in his closing statement. The Riley Gaines Act restricts transgender athlete participation in women's sports. No position on other LGBTQ+ policy areas found."
        coverage: 2
        position_tag: "Limit or oppose expansions"
        position_type: "pos"
        source: [0,1]

