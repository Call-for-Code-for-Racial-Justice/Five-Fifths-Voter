sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "Dolezal cited property taxes, income taxes, and overtaxation as core cost-of-living drivers across all three sources. In the interview he stated 'Americans are getting crushed by overtaxation' and described freezing property tax assessments at purchase price in Forsyth County as a statewide model. The website frames government as needing to 'go on a diet' rather than expanding programs. All mechanisms cited are tax reduction and government spending cuts, not new government programs."
        coverage: 3
        position_tag: "Market-driven solutions"
        position_type: "pos"
        source: [0,1]

      - topic: "Taxation"
        note: "Dolezal's most detailed policy area. The website calls for moving toward zero income tax by 'cutting waste and eliminating corporate handouts' and frames Georgia's income tax as the highest in the Southeast. In the debate he attacked 'crony capitalist corporate carveouts' and opposed special interest tax breaks. In the interview he advocated freezing property tax assessments at purchase price and eliminating school taxes for seniors over 65. He explicitly opposes using surplus revenues for targeted incentives, preferring across-the-board reductions."
        coverage: 3
        position_tag: "Reduce taxes"
        position_type: "pos"
        source: [0,1]

      - topic: "Small business & farming"
        note: "The website states the best way to grow Georgia's economy is to 'lower taxes for everyone—not have politicians play investment banker and pick winners and losers' and calls for eliminating 'corporate handouts.' In the debate Dolezal opposed 'crony capitalist corporate carveouts' that he said disadvantage ordinary businesses. No specific farm policy found in any source. Position is framed around reducing favoritism and regulation rather than targeted government support."
        coverage: 2
        position_tag: "Reduce regulation"
        position_type: "pos"
        source: [0,1]

      - topic: "Workers & wages"
        note: "No position found in reviewed sources. No statement on minimum wage, worker protections, or labor regulation appeared in the debate, interview, or campaign website."
        coverage: 0
