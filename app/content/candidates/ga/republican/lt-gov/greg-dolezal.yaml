      - topic: "Education"
        note: "Education is among Dolezal's most prominent issues. He authored the Georgia Promise Scholarship Act, which the website calls 'the most sweeping pro-parent education reform enacted in Georgia history.' He also authored the law banning DEI mandates in public schools. In the debate he described passing school choice legislation as a multi-year effort requiring persistence. The website states 'parents—not bureaucrats—should be in charge of their children's education' and emphasizes access regardless of income or zip code."
        coverage: 3
        position_tag: "Support school choice"
        position_type: "pos"
        source: [0,1]

      - topic: "Broadband & infrastructure"
        note: "The campaign website mentions investing in infrastructure as part of the jobs and economy platform, stating 'we must invest in infrastructure to support long-term growth.' This is a single passing reference without named policy or specific commitment. No infrastructure position found in the debate or interview beyond data center energy cost arguments, which are framed as a fiscal/crony capitalism issue rather than an infrastructure investment position."
        coverage: 1
        position_tag: null
        position_type: "none"
        source: [2]

  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "No position found in reviewed sources as defined by the taxonomy. In the interview and debate Dolezal raised concerns about data center power consumption, water usage, and the cost of grid expansion — but these were framed as consumer cost and crony capitalism arguments, not positions on environmental regulation or energy production priorities. The website section on data centers similarly focuses on tax abatements and cost-shifting, not environmental or energy policy."
        coverage: 0
        position_tag: null
        position_type: "none"
        source: null

      - topic: "Immigration"
        note: "Dolezal's immigration position is explicit and detailed across all three sources. The website states he supports 'strong enforcement of immigration laws, mass deportations, and policies that prioritize American citizens' and that illegal entrants 'should be sent home.' In the debate closing statement he stated 'if you come to this country illegally, you should be deported.' In the interview he framed immigration enforcement as part of an America First posture. No language supporting expanded legal pathways found in any source."
        coverage: 3
        position_tag: "Stricter enforcement"
        position_type: "pos"
        source: [0,1]

      - topic: "Housing"
        note: "Dolezal addressed housing through two distinct mechanisms. First, he authored a bill banning hedge funds and foreign investors from purchasing single-family homes in Georgia, detailed in both the interview and website, and referenced in the debate. Second, he supports eliminating property taxes to reduce the cost of homeownership. The first mechanism is a government prohibition (a regulatory intervention); the second reduces government's fiscal burden on owners. Both threads are directly evidenced in sources, meeting the standard for 'mixed approach.'"
        coverage: 3
        position_tag: "Mixed approach"
        position_type: "mixed"
        source: [0,1]
