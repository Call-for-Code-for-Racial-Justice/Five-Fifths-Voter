  - id: "community-environment"
    title: "Community & environment"
    items:
      - topic: "Environment & energy"
        note: "The Energy & Utilities page states California's 'clean-energy transition is necessary and urgent' and commits to treating 'clean energy and grid resilience as public investments.' However, it also frames bill affordability as central and calls for reviewing gas refinery operations to maintain gasoline supply — in the KTLA interview Becerra said he wanted to 'look at' refineries 'so they can continue to provide' gasoline. This combination of strong climate investment commitment with explicit attention to fossil fuel supply continuity and household cost impact constitutes two distinct, evidenced mechanisms pulling in opposite directions."
        coverage: 2
        position_tag: "Balance both"
        position_type: "pos"
        source: [1, 2]

      - topic: "Immigration"
        note: "In the CNN interview, Becerra explicitly defended healthcare access for undocumented immigrants, saying 'I want you to have health care' and describing undocumented people as 'hard workers' who contribute to the California economy. He also noted as Attorney General he sued Trump to stop 'ICE overreach' and protect Dreamers. His campaign homepage lists 'stopping ICE overreach' as a past achievement. His framing consistently favors expanded legal pathways and protections over enforcement."
        coverage: 2
        position_tag: "Expand legal pathways"
        position_type: "pos"
        source: [0, 2]

      - topic: "Housing"
        note: "In the CNN interview, Becerra said the solution is 'we build more' housing to reduce demand-driven prices. His housing priority page is extensively detailed: declares a housing emergency on Day One, targets the 40,000 approved but unfunded affordable units, reforms zoning to end exclusionary single-family zones, streamlines permitting, expands down payment assistance, protects renters via the Tenant Protection Act, and restricts bulk institutional investor purchases. This combines both government programs (subsidies, affordable mandates) and reducing development barriers (zoning reform, permitting streamlining, fee reduction)."
        coverage: 3
        position_tag: "Addresses both directions"
        position_type: "mixed"
        source: [0, 2]
