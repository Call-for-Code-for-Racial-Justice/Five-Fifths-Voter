  - id: "access-services"
    title: "Access & services"
    items:
      - topic: "Healthcare"
        note: "Becerra's healthcare priority page commits to building 'toward Medicare for All,' strengthening Medi-Cal, protecting ACA coverage, negotiating drug prices using state purchasing power, expanding CalRx for insulin and other essential medications, and guaranteeing access regardless of immigration status. In the CNN interview he said he would not 'kick people off their health care' and defended coverage for undocumented workers. This is an extensive, specifically detailed expansion of public coverage."
        coverage: 3
        position_tag: "Expand public coverage"
        position_type: "pos"
        source: [0, 2]

