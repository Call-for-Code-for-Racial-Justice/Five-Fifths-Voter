sections:
  - id: "economic-security"
    title: "Economic security"
    items:
      - topic: "Cost of living"
        note: "In the CNN interview, Becerra said the state needs to 'make it more affordable' and that too many families aren't seeing prosperity reach them, framing the solution as keeping the economic engine going 'for everyone.' His Economy & Affordability page commits to 'standing up to price gouging and unjustified rate hikes, expanding help with childcare and essential costs, and using the power of the state to lower prices where the market has failed.' His approach centers on government intervention against market failure, not market-driven solutions."
