      - topic: "Reproductive policy"
        note: "The campaign website homepage states that Becerra voted against the Defense of Marriage Act in 1996, ensured Planned Parenthood funding reached clinics as HHS Secretary, and will 'ensure that California continues to lead when it comes to protecting access to abortion.' His healthcare priority page pledges on Day One to 'protect access to essential, medically appropriate health services from federal restrictions, including reproductive care,' and to ensure 'uninterrupted, equitable access to contraception, abortion, and maternal health support.'"
        coverage: 3
        position_tag: "Pro-choice"
