      - topic: "Workers & wages"
        note: "The campaign website's housing page explicitly states that building at scale must include 'wage and labor standards that working families deserve' and references a history of peak union construction jobs. The Economy & Affordability page references fighting wage theft as attorney general. These are passing references within other issue areas, not a standalone workers and wages position."
